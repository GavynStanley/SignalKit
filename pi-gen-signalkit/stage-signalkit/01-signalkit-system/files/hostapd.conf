# /etc/hostapd/hostapd.conf — SignalKit WiFi Access Point
# This file is regenerated on boot by signalkit-wifi.service from config.py settings.
# Manual edits will be overwritten.

interface=wlan0
driver=nl80211
ssid=SignalKit
hw_mode=g
channel=6
ignore_broadcast_ssid=0
wmm_enabled=0
macaddr_acl=0

# WPA2 security (default password: signalkit1234)
auth_algs=1
wpa=2
wpa_passphrase=signalkit1234
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
rsn_pairwise=CCMP
