# /etc/dnsmasq.conf — SignalKit DHCP Server
# Assigns IP addresses to phones that connect to the SignalKit hotspot.

# Only listen on the hotspot interface
interface=wlan0

# DHCP range: assign addresses 192.168.4.2 - 192.168.4.50
# Lease time: 24 hours (phones keep the same IP for a full day)
dhcp-range=192.168.4.2,192.168.4.50,255.255.255.0,24h

# Don't advertise a default gateway or DNS server.
# This tells the phone "WiFi has no internet", so iOS/Android keeps
# cellular data active — the phone can access the Pi's web UI over
# WiFi while still using cellular for everything else (like Nexar).
dhcp-option=3
dhcp-option=6

# Don't forward DNS queries upstream (no internet on this network)
bogus-priv
no-resolv
no-poll
