# /etc/bluetooth/main.conf — SignalKit Bluetooth Configuration
# BlueZ main configuration for the SignalKit OBD2 dashboard.
# The key setting is AutoEnable=true so the BT adapter powers on at boot
# without needing a manual 'bluetoothctl power on'.

[General]
# Friendly name shown to other devices (not critical — nobody pairs TO us)
Name = SignalKit

# Device class: generic computer
Class = 0x000100

# Keep discoverable indefinitely (0 = never time out)
DiscoverableTimeout = 0

# Allow pairing without a PIN (ELM327 adapters use this mode)
PairableTimeout = 0

[Policy]
# Automatically power on the Bluetooth adapter when the service starts.
# Without this, you'd need to run 'bluetoothctl power on' manually each boot.
AutoEnable=true
