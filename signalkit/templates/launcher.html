{% extends 'base.html' %}
{% block title %}SignalKit{% endblock %}

{% block nav %}{% endblock %}

{% block content %}
  <div class="min-h-screen flex flex-col items-center justify-center p-6">

    <!-- Logo -->
    <div class="mb-8 text-center">
      <div class="w-16 h-16 mx-auto mb-3 rounded-2xl bg-acc/10 border border-acc/20 flex items-center justify-center">
        <svg class="w-8 h-8 text-acc" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <h1 class="text-lg font-bold tracking-wide">SignalKit</h1>
      <p class="text-xs text-zinc-500 mt-1">v{{ version }}</p>
    </div>

    <!-- App Grid -->
    <div class="grid grid-cols-3 gap-5 max-w-sm w-full">

      <!-- Dashboard -->
      <a href="/dashboard" class="flex flex-col items-center gap-2 group">
        <div class="w-16 h-16 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center group-hover:scale-105 group-active:scale-95 transition-transform">
          <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
        <span class="text-xs font-medium text-zinc-400 group-hover:text-white transition-colors">Dashboard</span>
      </a>

      <!-- Settings -->
      <a href="/settings" class="flex flex-col items-center gap-2 group">
        <div class="w-16 h-16 rounded-2xl bg-zinc-800 border border-zinc-700 flex items-center justify-center group-hover:scale-105 group-active:scale-95 transition-transform">
          <svg class="w-8 h-8 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.573-1.066z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <span class="text-xs font-medium text-zinc-400 group-hover:text-white transition-colors">Settings</span>
      </a>

      <!-- Diagnostics -->
      <a href="/diagnostics" class="flex flex-col items-center gap-2 group">
        <div class="w-16 h-16 rounded-2xl bg-blue-500/10 border border-blue-500/20 flex items-center justify-center group-hover:scale-105 group-active:scale-95 transition-transform">
          <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        </div>
        <span class="text-xs font-medium text-zinc-400 group-hover:text-white transition-colors">Diagnostics</span>
      </a>

      <!-- Dev Console -->
      <a href="/dev" class="flex flex-col items-center gap-2 group">
        <div class="w-16 h-16 rounded-2xl bg-amber-500/10 border border-amber-500/20 flex items-center justify-center group-hover:scale-105 group-active:scale-95 transition-transform">
          <svg class="w-8 h-8 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        </div>
        <span class="text-xs font-medium text-zinc-400 group-hover:text-white transition-colors">Dev Console</span>
      </a>

      <!-- Update -->
      <a href="/update" class="flex flex-col items-center gap-2 group">
        <div class="w-16 h-16 rounded-2xl bg-violet-500/10 border border-violet-500/20 flex items-center justify-center group-hover:scale-105 group-active:scale-95 transition-transform">
          <svg class="w-8 h-8 text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        </div>
        <span class="text-xs font-medium text-zinc-400 group-hover:text-white transition-colors">Update</span>
      </a>

      <!-- About -->
      <a href="/about" class="flex flex-col items-center gap-2 group">
        <div class="w-16 h-16 rounded-2xl bg-zinc-800 border border-zinc-700 flex items-center justify-center group-hover:scale-105 group-active:scale-95 transition-transform">
          <svg class="w-8 h-8 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <span class="text-xs font-medium text-zinc-400 group-hover:text-white transition-colors">About</span>
      </a>

    </div>

    <!-- Status -->
    <div class="mt-10 flex items-center gap-2">
      <span class="w-2 h-2 rounded-full" id="launcher-dot"></span>
      <span class="text-xs text-zinc-500" id="launcher-status">Checking...</span>
    </div>

  </div>
{% endblock %}

{% block footer %}{% endblock %}

{% block scripts %}
  <script>
    async function checkStatus() {
      try {
        const r = await fetch('/api/status');
        const d = await r.json();
        const dot = document.getElementById('launcher-dot');
        const status = document.getElementById('launcher-status');
        if (d.connected) {
          dot.style.background = '#22c55e';
          dot.style.boxShadow = '0 0 6px #22c55e';
          status.textContent = 'Connected to OBD adapter';
          status.className = 'text-xs text-emerald-400';
        } else {
          dot.style.background = '#ef4444';
          dot.style.boxShadow = '0 0 6px #ef4444';
          status.textContent = d.status || 'Disconnected';
          status.className = 'text-xs text-zinc-500';
        }
      } catch(e) {
        document.getElementById('launcher-dot').style.background = '#71717a';
        document.getElementById('launcher-status').textContent = 'Offline';
      }
    }
    checkStatus();
    setInterval(checkStatus, 5000);
  </script>
{% endblock %}
